<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dress Code</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" type="text/css" href="/styles.css">
    <link rel="stylesheet" type="text/css" href="/dresscode/dresscode.css" id="page-specific-css">
    <script src="/config.js"></script>
</head>

<body class="dresscode">
    <div class="text">

        <!-- Title & Subtitle Section -->
        <div class="intro-section">
            <h2>Dress Code</h2>
            <p class="subtitle">We said black tie not black belt sensei.</p>
        </div>

        <!-- Attire Cards Container -->
        <div class="attire-container">
            
            <!-- Ladies Attire Card -->
            <div class="display-card attire-card">
                <h3>Ladies</h3>
                <p>A floor-length evening gown is requested.</p>
                <!-- Style Tags/Keywords -->
                <div class="details">
                    <span>Evening Gown • Elegant • Glamorous</span>
                </div>
            </div>

            <!-- Gentlemen Attire Card -->
            <div class="display-card attire-card">
                <h3>Gentlemen</h3>
                <p>A tuxedo is requested.</p>
                <!-- Style Tags/Keywords -->
                <div class="details">
                    <span>Black Tie • Bow Tie • Formal Shoes</span>
                </div>
            </div>
        </div>
    </div>
    <!-- Script Logic -->
    <script src="../main.js"></script>
</body>

</html>
